%YAML:1.0 # need to specify the file type at the top!

verbosity: "INFO" # ALL, DEBUG, INFO, WARNING, ERROR, SILENT

use_fej: true # if first-estimate Jacobians should be used (enable for good consistency)
integration: "rk4" # discrete, rk4, analytical (if rk4 or analytical used then analytical covariance propagation is used)
use_stereo: false # mono down-facing camera
max_cameras: 1

# Pi-safe baseline:
# Keep these fixed first. After proper Kalibr calibration you can re-enable online refinement.
calib_cam_extrinsics: false
calib_cam_intrinsics: false
calib_cam_timeoffset: false
calib_imu_intrinsics: false
calib_imu_g_sensitivity: false

max_clones: 11
max_slam: 25
max_slam_in_update: 25
max_msckf_in_update: 20
dt_slam_delay: 2

gravity_mag: 9.8065

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "GLOBAL_3D"
feat_rep_aruco: "GLOBAL_3D"

# Zero-velocity update helps startup stability when stationary.
try_zupt: true
zupt_chi2_multipler: 0
zupt_max_velocity: 0.12
zupt_noise_multiplier: 50
zupt_max_disparity: 3.0
zupt_only_at_beginning: true

# ==================================================================
# initialization
# ==================================================================

init_window_time: 2.0
init_imu_thresh: 0.2
init_max_disparity: 8.0
init_max_features: 60

init_dyn_use: false
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 50
init_dyn_mle_max_time: 0.05
init_dyn_mle_max_threads: 2
init_dyn_num_pose: 6
init_dyn_min_deg: 10.0

init_dyn_inflation_ori: 10
init_dyn_inflation_vel: 100
init_dyn_inflation_bg: 10
init_dyn_inflation_ba: 100
init_dyn_min_rec_cond: 1e-12

init_dyn_bias_g: [ 0.0, 0.0, 0.0 ]
init_dyn_bias_a: [ 0.0, 0.0, 0.0 ]

# ==================================================================
# logging
# ==================================================================

record_timing_information: false
record_timing_filepath: "/tmp/traj_timing.txt"

save_total_state: false
filepath_est: "/tmp/ov_estimate.txt"
filepath_std: "/tmp/ov_estimate_std.txt"
filepath_gt: "/tmp/ov_groundtruth.txt"

# ==================================================================
# frontend
# ==================================================================

use_klt: true
num_pts: 120
fast_threshold: 25
grid_x: 8
grid_y: 8
min_px_dist: 20
knn_ratio: 0.70
track_frequency: 20.0
downsample_cameras: false
num_opencv_threads: 2
histogram_method: "HISTOGRAM"

use_aruco: false
num_aruco: 1024
downsize_aruco: true

# ==================================================================
# update tuning
# ==================================================================

up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

use_mask: false

# imu and camera spatial-temporal config
relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"
