apriltag_camera_detector:
  ros__parameters:
    input_source: device

    # For input_source:=device
    video_device: /dev/video1
    device_width: 640
    device_height: 480
    device_fps: 30.0
    detect_rate_hz: 20.0
    camera_frame_id: camera_link

    # Optional manual intrinsics for device mode. If fx/fy/cx/cy stay 0,
    # node uses an approximate camera model from hfov_deg and frame size.
    fx: 0.0
    fy: 0.0
    cx: 0.0
    cy: 0.0
    hfov_deg: 78.0
    dist_coeffs: []

    # For input_source:=ros_topics
    image_topic: /camera/image_raw
    camera_info_topic: /camera/camera_info

    tag_pose_topic: /precision_landing/tag_pose_camera
    dictionary: 36h11
    tag_size_m: 0.16
    target_tag_id: -1
    min_tag_area_px: 80.0

apriltag_precision_landing:
  ros__parameters:
    input_mode: camera_pose
    tf_topic: /tf
    camera_tag_pose_topic: /precision_landing/tag_pose_camera

    drone_pose_topic: /mavros/local_position/pose
    landing_target_topic: /mavros/landing_target/pose
    world_frame: map

    tag_frame_prefix: id
    tag_frame_exact: ""

    publish_rate_hz: 20.0
    input_timeout_sec: 0.30

    camera_offset_x: 0.0
    camera_offset_y: 0.0
    camera_offset_z: 0.0
    camera_roll: 0.0
    camera_pitch: 3.141592653589793
    camera_yaw: 1.5707963267948966

    publish_debug_tf: true
    debug_tag_child_frame: apriltag_detected

precision_landing_controller:
  ros__parameters:
    drone_pose_topic: /mavros/local_position/pose
    landing_target_topic: /mavros/landing_target/pose
    mavros_state_topic: /mavros/state
    cmd_vel_topic: /mavros/setpoint_velocity/cmd_vel
    command_frame: map

    publish_rate_hz: 20.0
    heartbeat_when_idle: true

    pose_timeout_sec: 0.40
    target_timeout_sec: 0.35
    require_offboard_mode: true

    kp_xy: 0.65
    kp_z: 0.85
    max_xy_speed: 0.60
    max_z_up_speed: 0.40
    max_z_down_speed: 0.45

    approach_height_m: 1.8
    enter_descend_xy_tol_m: 0.20
    enter_descend_height_tol_m: 0.35
    break_descend_xy_tol_m: 0.35

    descent_rate_mps: 0.22
    final_xy_tol_m: 0.12
    land_trigger_height_m: 0.55
    stable_before_land_sec: 1.0

    lost_target_behavior: hover
    auto_land_mode: AUTO.LAND
    enable_auto_land_request: true
    mode_request_retry_sec: 1.0
