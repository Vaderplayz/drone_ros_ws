ekf_filter_node_odom:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: false
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true

    odom0: /mavros/local_position/odom
    odom0_queue_size: 20
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 3.0
    odom0_twist_rejection_threshold: 2.0
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    imu0: /mavros/imu/data
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 1.0
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

ekf_filter_node_map:
  ros__parameters:
    frequency: 15.0
    sensor_timeout: 0.5
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true

    # Use MAVROS local odom as backbone so map->odom still exists even if /odometry/local is unavailable.
    odom0: /mavros/local_position/odom
    odom0_queue_size: 20
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 2.5
    odom0_twist_rejection_threshold: 1.5
    odom0_config: [true,  true,  false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]

    odom1: /odometry/gps
    odom1_queue_size: 20
    odom1_differential: false
    odom1_relative: false
    odom1_pose_rejection_threshold: 1.5
    odom1_twist_rejection_threshold: 0.8
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]

    imu0: /mavros/imu/data
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 1.0
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

navsat_transform:
  ros__parameters:
    frequency: 20.0
    delay: 3.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    publish_filtered_gps: true
    broadcast_cartesian_transform: false
    use_odometry_yaw: false
    wait_for_datum: false
