ekf_filter_node_odom:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true

    odom0: /mavros/local_position/odom
    odom0_queue_size: 15
    odom0_differential: false
    odom0_relative: false
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  true,
                   false, false, true,
                   false, false, false]

    imu0: /mavros/imu/data
    imu0_queue_size: 15
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

ekf_filter_node_map:
  ros__parameters:
    frequency: 20.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true

    odom0: /odometry/local
    odom0_queue_size: 15
    odom0_differential: false
    odom0_relative: false
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    odom1: /odometry/gps
    odom1_queue_size: 15
    odom1_differential: false
    odom1_relative: false
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]

    imu0: /mavros/imu/data
    imu0_queue_size: 15
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 2.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    publish_filtered_gps: true
    broadcast_cartesian_transform: true
    use_odometry_yaw: true
    wait_for_datum: false
